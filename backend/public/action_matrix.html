    function TaskCardA({ item, onAccept, onOpen }) {

          <div className="flex items-start justify-between gap-4">

                接单前往
              </button>
            </div>
          </div>

    }

    function TaskCardB({ item, expanded, onToggle, onOpen, forceCyan = false }) {
      const toneIsCyan = forceCyan || (item.statusTone && item.statusTone.includes('cyan'));
      return (
        <article className={cx(
          'flex h-full min-h-[118px] flex-col rounded-[16px] border border-white/10 bg-[rgba(255,255,255,0.04)] p-5 transition-all duration-200 hover:-translate-y-0.5 hover:border-white/20 hover:shadow-[0_2px_18px_rgba(0,0,0,0.18)]',
          expanded ? (toneIsCyan ? 'border-cyan-400/30' : 'border-lime-400/30') : ''
        )}>
          <div className="flex items-start justify-between gap-4">
            <Pill tone={toneIsCyan ? 'cyan' : 'lime'}>{item.tag}</Pill>
            <div className={cx('text-xs font-semibold', toneIsCyan ? 'text-cyan-400' : item.statusTone)}>{item.status}</div>
          </div>
          <div className="mt-3 flex items-start gap-3">
            <div className={cx('mt-1 text-xl', toneIsCyan ? 'text-cyan-400' : (item.statusTone || 'text-lime-400'))}>{item.icon}</div>
            <div className="min-w-0 flex-1">
              <h3 className="text-[1rem] font-semibold leading-6 text-white">{item.title}</h3>
              <p className="mt-1.5 line-clamp-2 text-[0.875rem] leading-6 text-neutral-400">{item.subtitle}</p>
            </div>
          </div>

          <div className="mt-4 flex-1 text-sm text-neutral-400">{item.meta}</div>

          <div className="mt-auto flex items-center justify-between gap-4 pt-3">
            <div className="text-xs text-neutral-500">{item.hint}</div>
            <button
              onClick={(e) => {
                e.stopPropagation();
                if (item.disabled) return;
                if (item.kind === 'expand') {
                  onOpen && onOpen(item);
                } else if (item.kind === 'action') {
                  item.onPrimaryAction && item.onPrimaryAction();
                }
              }}
              disabled={item.disabled}
              className={cx(
                buttonBase,
                item.disabled
                  ? 'cursor-not-allowed border border-white/10 bg-white/5 text-neutral-500'
                  : toneIsCyan
                    ? 'border border-cyan-400/25 bg-cyan-400/10 text-cyan-400 hover:bg-cyan-400/15'
                    : 'border border-lime-400/25 bg-lime-400/10 text-lime-400 hover:bg-lime-400/15'
              )}
            >
              {item.actionLabel}
            </button>

      );

    function Modal({ open, onClose, title, children }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-60 flex items-center justify-center">
          <div onClick={onClose} className="absolute inset-0 bg-black/72 backdrop-blur-[3px]" />
          <div className="relative z-70 w-[min(480px,82%)] rounded-[16px] border border-white/10 bg-[#0d0d0d] p-4 shadow-[0_18px_50px_rgba(0,0,0,0.55)]">

                    <div className="mt-2 text-[1.05rem] font-semibold text-white truncate">{title}</div>

              <button onClick={onClose} className="flex h-10 w-10 items-center justify-center rounded-full border border-white/10 bg-white/5 text-xl text-neutral-400 transition-colors hover:bg-white/10 hover:text-white">×</button>
            </div>
            <div className="mt-4">{children}</div>
          </div>
        </div>
      );
    }

    let _action_map = null;
    let _action_marker = null;
    let _action_map_timer = null;

    function destroyActionMap() {
      if (_action_map_timer) {
        clearTimeout(_action_map_timer);
        _action_map_timer = null;
      }
      if (_action_marker) {
        try { _action_marker.setMap(null); } catch(e){}
        _action_marker = null;
      }
      if (_action_map) {
        try { _action_map.destroy(); } catch(e){}
        _action_map = null;
      }
    }

    function initActionMap(lat, lng, title) {
      destroyActionMap();
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
        console.log('initActionMap: Invalid coordinates', { lat, lng });
        return null;
      }
      if (typeof AMap === 'undefined') {
        console.warn('initActionMap: AMap not loaded, will use SVG fallback');
        return null;
      }
      try {
        const container = document.getElementById('amap-action-map');
        if (!container) {
          console.warn('initActionMap: Container #amap-action-map not found');
          return null;
        }
        console.log('initActionMap: Initializing AMap at', { lat, lng, title });
        AMap.plugin(['AMap.ToolBar'], () => {
          try {
            _action_map = new AMap.Map(container, {
              zoom: 15,
              center: [lng, lat],
              viewMode: '2D',
              resizeEnable: true,
            });
            // Once map is created, elevate container above SVG
            container.style.zIndex = '10';
            container.style.pointerEvents = 'auto';
            _action_marker = new AMap.Marker({ position: [lng, lat], anchor: 'bottom-center', title });
            _action_map.add(_action_marker);
            _action_map.addControl(new AMap.ToolBar({ position: 'RB' }));
            _action_map.setFitView([_action_marker]);
            console.log('initActionMap: AMap initialized successfully');
            _action_map_timer = setTimeout(() => {
              if (!_action_map || !document.body.contains(container)) return;
              try { _action_map.resize(); } catch(e){}
            }, 600);
          } catch (err) {
            console.error('AMap init inner error:', err);
          }
        });
        return { map: _action_map, marker: _action_marker };
      } catch (err) {
        console.error('initActionMap failed:', err);
        return null;
      }
    }

    function MapPreview({ item }) {
      const mapInitialized = useRef(false);
      useEffect(() => {
        if (item && Number.isFinite(item.location_lat) && typeof AMap !== 'undefined') {
          try {
            initActionMap(item.location_lat, item.location_lng, item.location || item.title);
            mapInitialized.current = true;
          } catch (e) {
            console.warn('MapPreview init failed', e);
          }
        }
        return () => {
          if (mapInitialized.current) destroyActionMap();
        };
      }, [item && item.location_lat, item && item.location_lng]);

      return (
        <div className="relative overflow-hidden rounded-[20px] border border-white/10 bg-[#dfe6ef]">
          <div id="amap-action-map" className="absolute inset-0" style={{minHeight: 200, pointerEvents: 'none'}} />
          <svg viewBox="0 0 800 420" className="block h-[200px] w-full relative z-0">
            <defs>
              <linearGradient id="mapSky" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#eef3f8" />
                <stop offset="100%" stopColor="#d8e1ea" />
              </linearGradient>
              <filter id="pinShadow" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow dx="0" dy="10" stdDeviation="8" floodColor="#0b1a2f" floodOpacity="0.25" />
              </filter>
            </defs>
            <rect width="800" height="520" fill="url(#mapSky)" />
            <rect x="0" y="0" width="220" height="520" fill="#c6efbc" />
            <path d="M0 102 L220 160 L220 210 L0 156 Z" fill="#a8d89a" opacity="0.9" />
            <path d="M0 260 L800 260" stroke="#b9c5d1" strokeWidth="10" opacity="0.65" />
            <path d="M0 288 L800 288" stroke="#ffffff" strokeWidth="4" strokeDasharray="18 14" opacity="0.88" />
            <path d="M120 30 L290 200" stroke="#8f6ad6" strokeWidth="5" opacity="0.85" />
            <path d="M145 38 L305 198" stroke="#ffffff" strokeWidth="2" opacity="0.9" />
            <path d="M170 20 L380 232" stroke="#7fb7ff" strokeWidth="3" opacity="0.55" />
            <rect x="520" y="120" width="180" height="88" rx="18" fill="#f8fafc" opacity="0.92" />
            <rect x="300" y="322" width="180" height="88" rx="18" fill="#f8fafc" opacity="0.92" />
            <rect x="610" y="360" width="112" height="78" rx="18" fill="#f8fafc" opacity="0.92" />
            <circle cx="420" cy="230" r="20" fill="#2b8cff" opacity="0.18" />
            <path d="M400 188c-16 0-28 13-28 29 0 18 28 54 28 54s28-36 28-54c0-16-12-29-28-29zm0 40a11 11 0 1 1 0-22 11 11 0 0 1 0 22z" fill="#2f80ed" filter="url(#pinShadow)" />
            <circle cx="640" cy="182" r="6" fill="#f59e0b" />
            <circle cx="664" cy="182" r="6" fill="#22c55e" />
            <circle cx="688" cy="182" r="6" fill="#ef4444" />
            <text x="536" y="176" fontSize="26" fill="#5b6574" fontWeight="700">{item.location || '任务地点'}</text>
            <text x="88" y="448" fontSize="28" fill="#404b5a" fontWeight="700">地图预览</text>
            <text x="586" y="452" fontSize="20" fill="#6c7788" fontWeight="700">坐标已解析</text>
          </svg>
          {/* SVG 后备方案：当 AMap 加载失败或未初始化时显示 */}
          <style>{`
            #amap-action-map { z-index: 0; pointer-events: none; transition: z-index 0.2s; }
          `}</style>
          <div className="absolute left-4 top-4 inline-flex items-center gap-2 rounded-full border border-white/15 bg-black/45 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.2em] text-white/85 backdrop-blur-sm">
            地图预览

          <div className="absolute bottom-4 left-4 right-4 flex items-center justify-between gap-3 rounded-2xl border border-white/10 bg-black/65 px-4 py-3 text-xs text-neutral-200 backdrop-blur-sm">
            <span>{item.location || '任务地点'}</span>
            <span className="text-neutral-400">{Number.isFinite(item.location_lat) ? `${item.location_lat.toFixed(4)}, ${item.location_lng.toFixed(4)}` : '未解析坐标'}</span>
          </div>
        </div>
      );
    }
