<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>任务列表 — AutoDo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/app.css" />
  <script>
    window._AMapSecurityConfig = {
      securityJsCode: "e8d3f4cb468e6b1f4c35232bd0605f05"
    };
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=af867c6c9f62b853ece346b1fefdd8d7"></script>
</head>
<body class="page-bounties">
  <div class="bg-glow"></div>

  <nav class="nav">
    <a href="/" class="logo">
      <span class="logo-mark">◇</span>
      AutoDo
    </a>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/employer.html">雇主中心</a>
      <a href="/worker.html">雇员中心</a>
    </div>
  </nav>

  <header class="bounties-header">
    <h1>任务列表</h1>
    <p>已发布任务，按最新或报酬浏览（参考 <a href="https://rentahuman.ai/bounties?sort=new" target="_blank" rel="noopener">RentAHuman Bounties</a>）</p>
    <div class="sort-bar">
      <button type="button" class="sort-btn active" data-sort="new">最新</button>
      <button type="button" class="sort-btn" data-sort="price">报酬最高</button>
    </div>
  </header>

  <main class="bounties-main">
    <p id="bounties-count" class="bounties-count"></p>
    <div id="bounty-grid" class="bounty-grid"></div>
    <p id="bounties-empty" class="bounties-empty hidden">暂无已发布任务，去首页发布第一条吧</p>
  </main>

  <dialog id="bounty-modal" class="bounty-modal">
    <div class="bounty-modal-inner">
      <button type="button" class="modal-close" id="modal-close" aria-label="关闭">×</button>
      <div id="modal-body"></div>
      <a href="/#console" class="btn primary full modal-cta" id="modal-cta">去接单</a>
    </div>
  </dialog>

  <script src="/bounties.js"></script>
</body>
</html>
