<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>雇员中心 — AutoDo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/app.css" />
</head>
<body class="page-dash">
  <nav class="nav">
    <a href="/" class="logo"><span class="logo-mark">◇</span> AutoDo</a>
    <div class="nav-links">
      <a href="/bounties.html">任务列表</a>
      <a href="/employer.html">雇主中心</a>
      <a href="/worker.html" class="nav-current">雇员中心</a>
    </div>
  </nav>

  <main class="dash">
    <header class="dash-head">
      <h1>雇员中心</h1>
      <p>查看平台推送，接单并完成任务</p>
    </header>

    <section class="dash-card">
      <div class="worker-bar">
        <button type="button" id="btn-online" class="btn primary">开始听单</button>
        <button type="button" id="btn-offline" class="btn text hidden">停止听单</button>
        <span id="worker-wallet" class="wallet-tag"></span>
      </div>
    </section>

    <section class="dash-card">
      <div class="dash-row">
        <h2>平台推送</h2>
        <button type="button" id="btn-refresh-pushes" class="btn text">刷新</button>
      </div>
      <p class="dash-hint">以下为 AI 派单推送给你的任务（含已接 / 已被他人抢走）</p>
      <div id="push-list" class="task-list"></div>
      <p id="push-empty" class="empty">暂无推送，请先开启听单</p>
    </section>

    <section id="worker-active" class="dash-card hidden">
      <h2>当前任务</h2>
      <div id="worker-card" class="task-spec-card"></div>
      <label for="delivery-photo">交付凭证</label>
      <div class="input-wrapper">
        <input type="text" id="delivery-photo" placeholder="照片文件名或链接" />
        <button type="button" class="voice-trigger icon-voice-btn" data-voice-target="delivery-photo" title="按住说话">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="22"></line>
          </svg>
        </button>
      </div>
      <button type="button" id="btn-submit" class="btn primary full">提交交付</button>
    </section>

    <section class="dash-card">
      <h2>我接的单</h2>
      <div id="assignment-list" class="task-list compact"></div>
      <p id="assignment-empty" class="empty hidden">尚未接单</p>
    </section>
  </main>

  <script src="/voice.js"></script>
  <script type="module" src="/worker.js"></script>
</body>
</html>
